<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=app/index.html">
  <title>コマいぬ！を開く</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef5f3;
      color: #1f2a37;
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    }

    main {
      width: min(520px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid #d8e4e1;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 34px rgba(20, 48, 55, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0 0 18px;
      color: #64748b;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 8px 18px;
      border-radius: 6px;
      background: #0a6b75;
      color: #ffffff;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>コマいぬ！を開きます</h1>
    <p>自動で開かない場合は、下のボタンを押してください。</p>
    <a href="app/index.html">コマいぬ！を開く</a>
  </main>
  <script>
    window.location.replace("app/index.html");
  </script>
</body>
</html>
